name: Deploy dev site

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PA_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ssh.pythonanywhere.com >> ~/.ssh/known_hosts

      - name: Sync webapp/ to PythonAnywhere
        run: |
          rsync -az --delete \
            --exclude '__pycache__/' --exclude '*.pyc' \
            --exclude 'logs/' --exclude 'output/' --exclude 'Players/' \
            --exclude '_persistent_storage.yaml' --exclude 'host.yaml' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            webapp/ "${{ secrets.PA_USERNAME }}@ssh.pythonanywhere.com:/home/${{ secrets.PA_USERNAME }}/mysite_dev/"

      - name: Install/update Python dependencies
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.PA_USERNAME }}@ssh.pythonanywhere.com" \
            "/home/${{ secrets.PA_USERNAME }}/.virtualenvs/kh1appvenv_dev/bin/pip install -U -r /home/${{ secrets.PA_USERNAME }}/mysite_dev/requirements.txt"

      - name: Reload dev web app
        run: |
          curl -sf -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/webapps/dev-${{ secrets.PA_USERNAME }}.pythonanywhere.com/reload/"
